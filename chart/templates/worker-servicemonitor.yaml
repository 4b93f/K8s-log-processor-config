{{- if .Values.worker.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: worker-metrics
  namespace: {{ .Values.namespace }}
  labels:
    release: argocd-monitoring
spec:
  selector:
    matchLabels:
      app: worker
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
{{- end }}
