{{- if .Values.worker.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: {{ .Values.namespace }}
  labels:
    app: worker
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: {{ .Values.worker.metrics.port }}
      targetPort: {{ .Values.worker.metrics.port }}
{{- end }}
